<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poder, Sociedad y Escuela: Línea de Tiempo de la Educación Argentina</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#bee8f5;
padding:20px;
}

h1{
text-align:center;
margin-bottom:40px;
color:#000000;
}

.timeline-container{
overflow-x:auto;
padding:40px 0;
}

.timeline{
display:flex;
align-items:center;
position:relative;
min-width:max-content;
padding:80px 40px;
}

.timeline::before{
content:'';
position:absolute;
left:0;
right:0;
top:50%;
height:6px;
background:#0adfbb;
transform:translateY(-50%);
}

.event{
width:180px;
margin:0 25px;
text-align:center;
cursor:pointer;
position:relative;
z-index:2;
transition:.3s;
}

.event:hover{
transform:translateY(-8px);
}

.event img{
width:120px;
height:120px;
object-fit:cover;
border-radius:12px;
border:4px solid #2563eb;
background:white;
}

.year{
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#2563eb;
}

.title{
margin-top:5px;
font-size:14px;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.modal-content{
background:rgb(193, 247, 168);
width:90%;
max-width:800px;
max-height:85vh;
overflow-y:auto;
padding:25px;
border-radius:15px;
position:relative;
}

.modal-content img{
width:100%;
max-height:350px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.close{
position:absolute;
right:15px;
top:10px;
font-size:35px;
cursor:pointer;
font-weight:bold;
color:#000000;
}

.modal-content h2{
color:#1b0441;
margin-bottom:10px;
}

.modal-content p{
line-height:1.6;
}

@media(max-width:768px){
.event{
width:150px;
}
.event img{
width:100px;
height:100px;
}
}
</style>
</head>
<body>

<h1>Poder, Sociedad y Escuela: Línea de Tiempo de la Educación Argentina</h1>

<div class="timeline-container">
<div class="timeline" id="timeline"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" id="closeBtn">&times;</span>
<img id="modalImage" src="">
<h2 id="modalTitle"></h2>
<p id="modalDescription"></p>
</div>
</div>

<script>

const eventos=[
["1868","Presidencia de Sarmiento","Sarmiento impulsó la educación como herramienta de progreso social.Consideraba que la educación era la principal herramienta para el progreso del país. Impulsó la creación de escuelas y la formación docente profesional"],
["1871","Ley N.º 463 de Subvenciones Nacionales","Primer antecedente de intervención estatal nacional en financiamiento educativo.Establecía que el gobierno nacional podía otorgar fondos a las provincias para escuelas primarias."],
["1880","Presidencia de Julio Argentino Roca","Consolidación del Estado y la educación como herramienta de identidad nacional.Roca impulsó la modernización.La escuela debía formar ciudadanos y transmitir valores patrióticos."],
["1882","Congreso Pedagógico Internacional","Debate histórico sobre el papel de la religión y la laicidad en la educación.Reunió a intelectuales para debatir el futuro educativo. Se enfrentaron posturas religiosas y laicas."],
["1884","Ley 1420","Sancionada durante la presidencia de Roca. Es el pilar fundamental del sistema educativo argentino. Garantizó el acceso a la educación de toda la población."],
["1905","Ley Láinez","Permitió la creación de escuelas nacionales en provincias con dificultades para garantizar la educación primaria."],
["1966","La noche de los bastones largos","La represión policial en las sedes de la Universidad de Buenos Aires, mediante la utilización de bastones típicos de las fuerzas en esos años, para desalojar a estudiantes y docentes, marcó una jornada de brutalidad y avasallamiento de los principios universitarios"],
["1969","El Correntinazo","Protesta estudiantil contra la privatización del comedor universitario. Terminó con el asesinato del estudiante Juan José Cabral y fue antecedente del Cordobazo. Fortaleció los movimientos de oposición al régimen militar."],
["1970","Derogación de la Ley Láinez","Inicio del proceso de transferencia de escuelas nacionales a las provincias.La dictadura de Onganía comenzó a pasar la administración de escuelas a las provincias."],
["1976","Última Dictadura Militar","Se ejerció un fuerte control ideológico sobre la educación mediante censura y modificaciones curriculares."],
["1978","Transferencia de Escuelas Nacionales","La dictadura forzó a las provincias a hacerse cargo de las escuelas nacionales. Debilitó el financiamiento educativo en las provincias más pobres."],
["1983","Plan Nacional de Alfabetización","Impulsado por Raúl Alfonsín para combatir el analfabetismo y fortalecer la democracia."],
["1989","Presidencia de Menem","Se impulsaron reformas neoliberales que transformaron el sistema educativo."],
["1992","Ley 24.049","Completó la transferencia de servicios educativos nacionales a las provincias."],
["1993","Ley Federal de Educación  N.º 24.19","Reorganización total: creación de EGB y Polimodal. Amplió la obligatoriedad pero fue criticada por aumentar la fragmentación.Profundizó las desigualdades entre las distintas jurisdicciones."],
["1995","Ley de Educación Superior","Reguló universidades e institutos superiores incorporando mecanismos de evaluación."],
["2001","Crisis Económica y Social","Muchas escuelas debieron garantizar alimentación ante la pobreza extrema. Se evidenció la necesidad de una nueva intervención estatal protectora."],
["2003","Presidencia de Néstor Kirchner","Recuperación de la inversión y la educación como responsabilidad central.Impulsó políticas de inclusión y ampliación de derechos tras la crisis. Inició una etapa de fortalecimiento del sistema educativo nacional."],
["2005","Nuevas Políticas Educativas","Se aprobaron leyes vinculadas al financiamiento educativo y protección de derechos."],
["2006","Ley de Educación Nacional y ESI","Reconoció la educación como derecho social y amplió la obligatoriedad escolar."],
["2007","Presidencia de Cristina Fernández","Continuó las políticas de inclusión, igualdad educativa y tecnología. Ampliacon de derechos sociales, implementacion de programas como el CONECTAR IGUALDAD, y las BECAS PRO.GRE.SAR"],
["2024","Gobierno de Javier Milei","SDesfinanciamiento, recorte a la educación y a programas como el CONECTAR IGUALDAD, congelamiento de las BECAS PRO.GRE.SAR."]
];

const timeline=document.getElementById('timeline');
const modal=document.getElementById('modal');
const modalImage=document.getElementById('modalImage');
const modalTitle=document.getElementById('modalTitle');
const modalDescription=document.getElementById('modalDescription');
const closeBtn=document.getElementById('closeBtn');

eventos.forEach(evento=>{
const div=document.createElement('div');
div.className='event';

div.innerHTML=`
<img src="${evento[0]}.jpg" alt="${evento[0]}">
<div class="year">${evento[0]}</div>
<div class="title">${evento[1]}</div>
`;

div.addEventListener('click',()=>{
modal.style.display='flex';
modalImage.src=`${evento[0]}.jpg`;
modalTitle.textContent=`${evento[0]} - ${evento[1]}`;
modalDescription.textContent=evento[2];
});

timeline.appendChild(div);
});

closeBtn.addEventListener('click',()=>{
modal.style.display='none';
});

window.addEventListener('click',(e)=>{
if(e.target===modal){
modal.style.display='none';
}
});

</script>

</body>
</html>
